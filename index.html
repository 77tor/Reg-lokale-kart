<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartleggingsverktøy Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        .container { max-width: 1400px; margin: 20px auto; padding: 20px; background: white; border-radius: 8px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; }
        th { background: #f8f9fa; }
        .alert-low { background-color: #ffcccc !important; font-weight: bold; }
        
        .no-print { display: block; }
        .btn { padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; color: white; font-weight: bold; }
        .btn-reg { background: #27ae60; }
        .btn-edit { background: #2980b9; }
        .btn-slett { background: #c0392b; }
        .btn-fjern { background: #7f8c8d; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; width: 450px; border-radius: 8px; }

        /* PRINT-REGLER */
        @media print {
            body { background: white; }
            .no-print, .modal { display: none !important; }
            .container { width: 100%; max-width: none; margin: 0; padding: 0; box-shadow: none; }
            .page-break { page-break-before: always; display: block; clear: both; }
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            .alert-low { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div id="loginScreen" style="display:none; flex-direction:column; align-items:center; margin-top:100px;">
    <h2>Lokal Kartlegging</h2>
    <button class="btn btn-reg" onclick="login()">Logg inn med Google</button>
</div>

<div id="mainContent" class="container" style="display:none;">
    <div class="no-print">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <span>Bruker: <b id="userInfo"></b></span>
            <button class="btn btn-fjern" onclick="logout()">Logg ut</button>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; background: #eee; padding: 15px; border-radius: 8px;">
            <div><label>År:</label><br><select id="mAar" onchange="hentData()"><option value="2024-2025">2024-2025</option><option value="2025-2026" selected>2025-2026</option></select></div>
            <div><label>Fag:</label><br><select id="mFag" onchange="hentData()"><option value="Lesing">Lesing</option><option value="Regning">Regning</option></select></div>
            <div><label>Periode:</label><br><select id="mPeriode" onchange="hentData()"><option value="Høst">Høst</option><option value="Vår">Vår</option></select></div>
            <div><label>Trinn:</label><br><select id="mTrinn" onchange="hentData()"><option value="1">1. Trinn</option><option value="2">2. Trinn</option><option value="3">3. Trinn</option><option value="4">4. Trinn</option><option value="5">5. Trinn</option><option value="6">6. Trinn</option><option value="7">7. Trinn</option></select></div>
            <div><label>Klasse:</label><br><select id="mKlasse" onchange="hentData()"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></div>
        </div>

        <div style="margin-bottom: 20px; display:flex; gap:10px;">
            <button class="btn btn-edit" onclick="sjekkAdminKode()">Admin Panel</button>
            <button class="btn btn-reg" onclick="window.print()">Skriv ut gjeldende side</button>
        </div>

        <div id="adminPanel" style="display:none; background:#d1d8e0; padding:15px; border-radius:8px; margin-bottom: 20px;">
            <h4>Admin Panel</h4>
            <button class="btn btn-edit" onclick="document.getElementById('modalRapport').style.display='block'">Generer Årsrapport (Alle trinn)</button>
        </div>
    </div>

    <h2 id="printTittel" style="text-align:center;"></h2>
    <div id="hovedInnhold">
        <table id="hovedTabell">
            <thead id="tHead"></thead>
            <tbody id="tBody"></tbody>
        </table>
    </div>
</div>

<div id="modalRapport" class="modal">
    <div class="modal-content">
        <h3>Generer Årsrapport</h3>
        <p>Dette lager en samlerapport for alle klasser og trinn i valgt periode.</p>
        <label>Skoleår:</label><br><select id="adminAar"><option value="2024-2025">2024-2025</option><option value="2025-2026" selected>2025-2026</option></select><br><br>
        <label>Fag:</label><br><select id="adminFag"><option value="Lesing">Lesing</option><option value="Regning">Regning</option></select><br><br>
        <label>Periode:</label><br><select id="adminPeriode"><option value="Høst">Høst</option><option value="Vår">Vår</option></select><br><br>
        
        <div style="display:flex; gap:10px;">
            <button class="btn btn-reg" style="flex:2" onclick="kjorAdminRapport('alle')">Vis Full Rapport</button>
            <button class="btn btn-slett" style="flex:2" onclick="kjorAdminRapport('kritisk')">Kun Under Grense</button>
            <button class="btn btn-fjern" style="flex:1" onclick="document.getElementById('modalRapport').style.display='none'">Avbryt</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalNavn"></h3>
        <div id="oppgaveFelter"></div><br>
        <button class="btn btn-reg" onclick="lagreData()">Lagre</button>
        <button class="btn btn-fjern" onclick="lukkModal()">Avbryt</button>
    </div>
</div>

<script src="elever.js"></script>
<script src="oppsett.js"></script>
<script src="app.js"></script>
</body>
</html>
