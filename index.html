    <style>

// Logikk for Enter-navigering
function handterEnter(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        const inputs = Array.from(document.querySelectorAll('#modal input'));
        const index = inputs.indexOf(event.target);
        if (index > -1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
            inputs[index + 1].select();
        } else if (index === inputs.length - 1) {
            lagreData();
        }
    }
}

function getOppsett() {
    const aar = document.getElementById('mAar').value;
    const key = (aar === "2024-2025") ? "2024-2025" : "STANDARD_2025";
    const fag = document.getElementById('mFag').value;
    const periode = document.getElementById('mPeriode').value;
    const trinn = document.getElementById('mTrinn').value;
    try { return oppgaveStruktur[key][fag][periode][trinn]; } catch(e) { return null; }
}

function oppdater() {
    const t = parseInt(document.getElementById('mTrinn').value);
    document.getElementById('optD').classList.toggle('hidden', t < 4);
    
    const fag = document.getElementById('mFag').value;
    const klasse = document.getElementById('mTrinn').value + document.getElementById('mKlasse').value;
    const periode = document.getElementById('mPeriode').value;
    const aar = document.getElementById('mAar').value;
    document.getElementById('dynamiskTittel').innerText = `Kartlegging i ${fag} - ${klasse} - ${periode}en ${aar}`;

    byggTabellHode();
    hentData();
}

// NY SORTERINGSFUNKSJON
function settSortering(felt, erOppgave = false, oppgaveIndex = -1) {
    if (sorteringsFelt === (erOppgave ? 'oppgave_' + oppgaveIndex : felt)) {
        sorteringsRetning *= -1; // Snu retning hvis samme kolonne klikkes
    } else {
        sorteringsFelt = erOppgave ? 'oppgave_' + oppgaveIndex : felt;
        sorteringsRetning = 1;
    }
    tegnTabell(); // Tegn tabellen på nytt med ny sortering
}

function byggTabellHode() {
    const o = getOppsett();
    const h = document.getElementById('tHead');
    if (!o) { h.innerHTML = "<tr><th>Mal mangler</th></tr>"; return; }
    
    let html = `<tr>`;
    html += `<th onclick="settSortering('navn')">Navn ${hentSortIkon('navn')}</th>`;
    
    o.oppgaver.forEach((op, i) => {
        html += `<th onclick="settSortering('oppgave_${i}', true, ${i})">${op.navn}<br><small>(${op.maks})</small> ${hentSortIkon('oppgave_' + i)}</th>`;
    });
    
    html += `<th onclick="settSortering('sum')">Sum ${hentSortIkon('sum')}</th>`;
    html += `<th onclick="settSortering('prosent')">% ${hentSortIkon('prosent')}</th>`;
    html += `<th onclick="settSortering('status')">Status ${hentSortIkon('status')}</th>`;
    html += `<th>Handlinger</th></tr>`;
    h.innerHTML = html;
}

function hentSortIkon(felt) {
    if (sorteringsFelt !== felt) return `<span class="sort-icon">↕</span>`;
    return sorteringsRetning === 1 ? `<span class="sort-icon">↑</span>` : `<span class="sort-icon">↓</span>`;
}

function tegnTabell() {
    const o = getOppsett();
    const body = document.getElementById('tBody');
    body.innerHTML = "";
    if (!o) return;

    // Sorter gjeldendeData før tegning
    let dataKopi = [...gjeldendeData];
    dataKopi.sort((a, b) => {
        let vA, vB;
        
        if (sorteringsFelt.startsWith('oppgave_')) {
            const idx = parseInt(sorteringsFelt.split('_')[1]);
            vA = a.detaljer[idx] || 0;
            vB = b.detaljer[idx] || 0;
        } else if (sorteringsFelt === 'prosent') {
            vA = a.sum / a.maks;
            vB = b.sum / b.maks;
        } else if (sorteringsFelt === 'status') {
            vA = a.sum <= o.grenseTotal ? 1 : 0;
            vB = b.sum <= o.grenseTotal ? 1 : 0;
        } else {
            vA = a[sorteringsFelt];
            vB = b[sorteringsFelt];
        }

        if (typeof vA === 'string') {
            return vA.localeCompare(vB) * sorteringsRetning;
        }
        return (vA - vB) * sorteringsRetning;
    });

    dataKopi.forEach(d => {
        const erKritisk = d.sum <= o.grenseTotal;
        let row = `<tr class="${erKritisk ? 'critical-row' : ''}"><td>${d.navn}</td>`;
        o.oppgaver.forEach((op, i) => {
            const poeng = d.detaljer[i] || 0;
            const cellKritisk = op.grense !== -1 && poeng <= op.grense;
            row += `<td class="${cellKritisk ? 'critical-cell' : ''}">${poeng}</td>`;
        });
        row += `<td>${d.sum}</td><td>${Math.round(d.sum/d.maks*100)}%</td><td>${erKritisk ? 'OPPFØLGING' : 'OK'}</td>`;
        row += `<td>
            <div class="action-btns">
                <button class="btn btn-warning" onclick='endre("${d.id}", ${JSON.stringify(d)})'>Endre</button>
                <button class="btn btn-delete" onclick="slett('${d.id}')">Slett</button>
            </div>
        </td></tr>`;
        body.innerHTML += row;
    });
}

    const knapp = document.getElementById('btnLagre');
    felt.innerHTML = "";
    navnfelt.onkeydown = handterEnter;
    
    if (eksisterendeData) {
        tittel.innerText = "Endre registrering";
        navnfelt.value = eksisterendeData.navn;
        knapp.innerText = "Oppdater";
    } else {
        tittel.innerText = "Ny registrering";
        navnfelt.value = "";
        knapp.innerText = "Lagre i database";
    }

    o.oppgaver.forEach((op, i) => {
        const div = document.createElement('div');
        const verdi = eksisterendeData ? eksisterendeData.detaljer[i] : 0;
        div.innerHTML = `<label>${op.navn} (maks ${op.maks}):</label>
                         <input type="number" class="pInput" max="${op.maks}" min="0" value="${verdi}">`;
        const inp = div.querySelector('input');
        inp.onkeydown = handterEnter;
        felt.appendChild(div);
    });
    document.getElementById('modal').style.display = 'block';
    navnfelt.focus();
}

function lukkModal() { document.getElementById('modal').style.display = 'none'; redigererNøkkel = null; }

function lagreData() {
    const n = document.getElementById('elevNavn').value;
    if (!n) return alert("Navn mangler");
    const o = getOppsett();
    const inputs = document.querySelectorAll('.pInput');
    const detaljer = Array.from(inputs).map((input, i) => {
        let v = parseInt(input.value) || 0;
        const m = o.oppgaver[i].maks;
        return v > m ? m : (v < 0 ? 0 : v);
    });
    const sum = detaljer.reduce((a, b) => a + b, 0);
    const maksTotal = o.oppgaver.reduce((a, b) => a + b.maks, 0);
    const path = `kartlegging/${document.getElementById('mAar').value}/${document.getElementById('mFag').value}/${document.getElementById('mPeriode').value}/${document.getElementById('mTrinn').value}/${document.getElementById('mKlasse').value}`;
    const data = { navn: n, detaljer, sum, maks: maksTotal };

    if (redigererNøkkel) {
        db.ref(path + "/" + redigererNøkkel).set(data).then(() => lukkModal());
    } else {
        db.ref(path).push(data).then(() => { lukkModal(); document.getElementById('elevNavn').value = ""; });
    }
}

function hentData() {
    const path = `kartlegging/${document.getElementById('mAar').value}/${document.getElementById('mFag').value}/${document.getElementById('mPeriode').value}/${document.getElementById('mTrinn').value}/${document.getElementById('mKlasse').value}`;
    db.ref(path).on('value', snap => {
        gjeldendeData = [];
        snap.forEach(child => {
            let item = child.val();
            item.id = child.key;
            gjeldendeData.push(item);
        });
        byggTabellHode(); // Oppdater hode (i tilfelle sorteringsikon endres)
        tegnTabell();
    });
}

function endre(key, data) { visModal(data, key); }
function slett(key) {
    if (confirm("Slette?")) {
        const path = `kartlegging/${document.getElementById('mAar').value}/${document.getElementById('mFag').value}/${document.getElementById('mPeriode').value}/${document.getElementById('mTrinn').value}/${document.getElementById('mKlasse').value}`;
        db.ref(path + "/" + key).remove();
    }
}
</script>
