<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .selectors { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .selectors div { display: flex; flex-direction: column; }
        label { font-size: 0.8em; font-weight: bold; margin-bottom: 4px; color: #555; }
        select, input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }

        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; }
        .btn-report { background: #3498db; color: white; }
        .btn-excel { background: #e67e22; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; text-align: left; padding: 12px; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 90%; max-width: 900px; border-radius: 10px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 15px; padding-bottom: 10px; }
        
        .popup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .p-group { background: #f8f9fa; padding: 10px; border-radius: 5px; border: 1px solid #e9ecef; }
        .p-group label { font-size: 0.75em; display: block; margin-bottom: 5px; }
        .p-group input { width: 100%; border: 1px solid #ced4da; box-sizing: border-box; }
        
        .hidden { display: none; }
    </style>
</head>

// --- LOGIKK ---
function oppdater() {
    const aar = document.getElementById('mAar').value;
    const trinn = document.getElementById('mTrinn').value;
    const d = document.getElementById('optD');
    
    if (trinn == "5" || (aar == "2026/2027" && trinn == "6")) d.classList.remove('hidden');
    else {
        d.classList.add('hidden');
        if (document.getElementById('mKlasse').value == "D") document.getElementById('mKlasse').value = "A";
    }
    hentData();
}

function aapnePopup() {
    const aar = document.getElementById('mAar').value;
    const fag = document.getElementById('mFag').value;
    const per = document.getElementById('mPeriode').value;
    const trinn = document.getElementById('mTrinn').value;

    let oppgaver = (oppgaveStruktur[aar]?.[fag]?.[per]?.[trinn]) || (oppgaveStruktur["Standard"]?.[fag]?.[per]?.[trinn]);
    
    const area = document.getElementById('oppgArea');
    area.innerHTML = "";
    let maksSum = 0;

    if (oppgaver) {
        oppgaver.forEach((o, i) => {
            maksSum += o.maks;
            area.innerHTML += `
                <div class="p-group">
                    <label>${o.navn} (max ${o.maks})</label>
                    <input type="number" class="pop-in" data-maks="${o.maks}" value="0" oninput="sumPop()">
                </div>`;
        });
    }

    document.getElementById('pMaks').innerText = maksSum;
    document.getElementById('pSum').innerText = "0";
    document.getElementById('pop').style.display = "block";
}

function sumPop() {
    let s = 0;
    document.querySelectorAll('.pop-in').forEach(i => {
        let v = parseInt(i.value) || 0;
        let m = parseInt(i.dataset.maks);
        if (v > m) { v = m; i.value = m; }
        if (v < 0) { v = 0; i.value = 0; }
        s += v;
    });
    document.getElementById('pSum').innerText = s;
}

function lukk() { 
    document.getElementById('pop').style.display = "none";
    document.getElementById('eNavn').value = "";
}

// --- FIREBASE OPERASJONER ---
async function lagre() {
    const navn = document.getElementById('eNavn').value;
    if (!navn) return alert("Vennligst skriv navn på elev");

    const data = {
        navn: navn,
        sum: parseInt(document.getElementById('pSum').innerText),
        maks: parseInt(document.getElementById('pMaks').innerText),
        aar: document.getElementById('mAar').value,
        trinn: document.getElementById('mTrinn').value,
        klasse: document.getElementById('mKlasse').value,
        fag: document.getElementById('mFag').value,
        periode: document.getElementById('mPeriode').value,
        dato: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
        await db.collection("resultater").add(data);
        lukk();
        hentData();
    } catch (e) {
        alert("Feil ved lagring: " + e.message);
    }
}

async function hentData() {
    const tBody = document.getElementById('tBody');
    tBody.innerHTML = "<tr><td colspan='5'>Henter...</td></tr>";

    try {
        const snap = await db.collection("resultater")
            .where("aar", "==", document.getElementById('mAar').value)
            .where("trinn", "==", document.getElementById('mTrinn').value)
            .where("klasse", "==", document.getElementById('mKlasse').value)
            .where("fag", "==", document.getElementById('mFag').value)
            .where("periode", "==", document.getElementById('mPeriode').value)
            .get();

        tBody.innerHTML = "";
        if (snap.empty) {
            tBody.innerHTML = "<tr><td colspan='5' style='text-align:center'>Ingen resultater funnet.</td></tr>";
            return;
        }

        snap.forEach(doc => {
            const d = doc.data();
            const prosent = Math.round((d.sum / d.maks) * 100) + "%";
            const dato = d.dato ? d.dato.toDate().toLocaleDateString() : "-";
            tBody.innerHTML += `<tr><td>${d.navn}</td><td>${d.sum}</td><td>${d.maks}</td><td>${prosent}</td><td>${dato}</td></tr>`;
        });
    } catch (e) {
        tBody.innerHTML = "<tr><td colspan='5'>Feil: " + e.message + "</td></tr>";
    }
}

window.onload = oppdater;
