<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartleggingsverktøy - Dashbord</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Dashbord-velgere */
        .selectors { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .selectors div { display: flex; flex-direction: column; }
        label { font-size: 0.8em; font-weight: bold; margin-bottom: 4px; color: #555; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }

        /* Handlingsknapper */
        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; }
        .btn-report { background: #3498db; color: white; }
        .btn-excel { background: #e67e22; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Tabell for eksisterende data */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #ecf0f1; text-align: left; padding: 12px; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #fcfcfc; }

        /* Modal (Popup) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 80%; max-width: 800px; border-radius: 10px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .close { font-size: 28px; cursor: pointer; }

        /* Popup Grid for oppgaver */
        .popup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .popup-input-group { background: #f4f7f6; padding: 8px; border-radius: 4px; }
        .popup-input-group input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Administrasjon av resultater</h2>
    </header>

    <div class="selectors">
        <div>
            <label>Skoleår</label>
            <select id="mainAar" onchange="oppdaterDashbord()">
                <option value="2024/2025">2024/2025</option>
                <option value="2025/2026" selected>2025/2026</option>
                <option value="2026/2027">2026/2027</option>
            </select>
        </div>
        <div>
            <label>Trinn</label>
            <select id="mainTrinn" onchange="oppdaterDashbord()">
                <option value="1">1. trinn</option>
                <option value="2">2. trinn</option>
                <option value="3">3. trinn</option>
                <option value="4">4. trinn</option>
                <option value="5">5. trinn</option>
                <option value="6">6. trinn</option>
                <option value="7">7. trinn</option>
            </select>
        </div>
        <div>
            <label>Klasse</label>
            <select id="mainKlasse" onchange="oppdaterDashbord()">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option id="optD" value="D" class="hidden">D</option>
            </select>
        </div>
        <div>
            <label>Fag</label>
            <select id="mainFag" onchange="oppdaterDashbord()">
                <option value="Lesing">Lesing</option>
                <option value="Regning">Regning</option>
            </select>
        </div>
        <div>
            <label>Periode</label>
            <select id="mainPeriode" onchange="oppdaterDashbord()">
                <option value="Høst">Høst</option>
                <option value="Vår">Vår</option>
            </select>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-add" onclick="aapnePopup()">+ Legg inn resultat</button>
        <button class="btn btn-report" onclick="lagRapport()">Generer Rapport</button>
        <button class="btn btn-excel" onclick="eksporterExcel()">Eksport til Excel</button>
    </div>

    <div id="oversiktSeksjon">
        <table id="resultatTabell">
            <thead>
                <tr>
                    <th>Elevnavn</th>
                    <th>Poeng</th>
                    <th>Prosent</th>
                    <th>Dato registrert</th>
                    <th>Handlinger</th>
                </tr>
            </thead>
            <tbody id="tabellBody">
                </tbody>
        </table>
    </div>
</div>

<div id="resultatModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTittel">Ny registrering</h3>
            <span class="close" onclick="lukkPopup()">&times;</span>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label>Elevens Navn</label>
            <input type="text" id="elevNavn" placeholder="Skriv navn..." style="width:100%; padding:10px; font-size:1.1em;">
        </div>

        <div id="oppgaveInputArea" class="popup-grid">
            </div>

        <div class="modal-header" style="border-top: 1px solid #eee; padding-top:15px;">
            <h4>Total: <span id="popupSum">0</span> / <span id="popupMaks">0</span></h4>
            <button class="btn btn-add" style="width: auto;" onclick="lagreResultat()">Lagre og Lukk</button>
        </div>
    </div>
</div>

<script>
// --- KONFIGURASJON (Gjenbruker din struktur) ---
const oppgaveStruktur = {
    // ... her ligger objektet vi bygde ferdig i forrige steg ...
};

// Funksjon for å sjekke om Klasse D skal vises
function sjekkKlasseD() {
    const aar = document.getElementById('mainAar').value;
    const trinn = document.getElementById('mainTrinn').value;
    const optD = document.getElementById('optD');
    
    if (trinn == "5" || (aar == "2026/2027" && trinn == "6")) {
        optD.classList.remove('hidden');
    } else {
        optD.classList.add('hidden');
        if (document.getElementById('mainKlasse').value == "D") document.getElementById('mainKlasse').value = "A";
    }
}

// Oppdaterer hovedskjermen
function oppdaterDashbord() {
    sjekkKlasseD();
    hentDataFraFirebase();
}

// Denne funksjonen ville normalt hentet data fra databasen
function hentDataFraFirebase() {
    const tbody = document.getElementById('tabellBody');
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">Henter data fra skyen...</td></tr>`;
    
    // Her kobler du på Firebase senere
    setTimeout(() => {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">Ingen resultater registrert for dette valget ennå.</td></tr>`;
    }, 500);
}

// POPUP LOGIKK
function aapnePopup() {
    const aar = document.getElementById('mainAar').value;
    const fag = document.getElementById('mainFag').value;
    const periode = document.getElementById('mainPeriode').value;
    const trinn = document.getElementById('mainTrinn').value;
    const klasse = document.getElementById('mainKlasse').value;

    document.getElementById('modalTittel').innerText = `Registrering: ${fag} ${periode} - ${trinn}${klasse}`;
    
    // Generer oppgavene i popup-en
    let oppgaver = (oppgaveStruktur[aar]?.[fag]?.[periode]?.[trinn]) || (oppgaveStruktur["Standard"]?.[fag]?.[periode]?.[trinn]);
    
    const container = document.getElementById('oppgaveInputArea');
    container.innerHTML = "";
    let maksSum = 0;

    if (oppgaver) {
        oppgaver.forEach((oppg, index) => {
            maksSum += oppg.maks;
            container.innerHTML += `
                <div class="popup-input-group">
                    <label>${oppg.navn} (max ${oppg.maks})</label>
                    <input type="number" class="p-input" data-maks="${oppg.maks}" oninput="beregnPopupTotal()">
                </div>`;
        });
    }

    document.getElementById('popupMaks').innerText = maksSum;
    document.getElementById('resultatModal').style.display = "block";
}

function beregnPopupTotal() {
    let sum = 0;
    document.querySelectorAll('.p-input').forEach(input => {
        let val = parseInt(input.value) || 0;
        let maks = parseInt(input.dataset.maks);
        if (val > maks) { val = maks; input.value = maks; }
        if (val < 0) { val = 0; input.value = 0; }
        sum += val;
    });
    document.getElementById('popupSum').innerText = sum;
}

function lukkPopup() {
    document.getElementById('resultatModal').style.display = "none";
    document.getElementById('elevNavn').value = "";
}

function lagreResultat() {
    const navn = document.getElementById('elevNavn').value;
    if (!navn) { alert("Vennligst skriv inn navn på elev"); return; }
    
    alert(`Lagrer resultat for ${navn} til Firebase...`);
    lukkPopup();
    hentDataFraFirebase(); // Oppdater tabellen
}

// Funksjoner for knapper
function lagRapport() { alert("Genererer PDF-rapport..."); }
function eksporterExcel() { alert("Lager Excel-fil..."); }

window.onload = oppdaterDashbord;
</script>
</body>
</html>
