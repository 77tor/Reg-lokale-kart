<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokal Kartlegging - Sikker utgave</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { color: #1a73e8; text-align: center; }
        
        /* Logg inn-seksjon */
        #auth-section { text-align: center; padding: 40px; }
        .google-btn { background: white; color: #444; border: 1px solid #ddd; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .google-btn:hover { background: #eee; }

        /* Skjema og Innhold */
        #app-content { display: none; }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        .save-btn { background: #34a853; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .logout-btn { background: #d93025; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; float: right; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f1f3f4; }
        .user-info { font-size: 0.9rem; margin-bottom: 20px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h1>Lokale Kartlegginger</h1>
        <p>Vennligst logg inn med din skole-konto for å fortsette.</p>
        <button class="google-btn" id="loginBtn">Logg inn med Google</button>
    </div>

    <div id="app-content">
        <button class="logout-btn" id="logoutBtn">Logg ut</button>
        <div class="user-info" id="userInfo"></div>
        <h1>Registrering</h1>

        <div class="setup-grid">
            <div class="input-group">
                <label>Skoleår</label>
                <select id="skoleaar"><option>2024/2025</option><option selected>2025/2026</option></select>
            </div>
            <div class="input-group">
                <label>Trinn</label>
                <select id="trinn">
                    <option value="1">1. Trinn</option><option value="2">2. Trinn</option>
                    <option value="3">3. Trinn</option><option value="4">4. Trinn</option>
                </select>
            </div>
            <div class="input-group">
                <label>Fag</label>
                <select id="fag"><option>Lesing</option><option>Regning</option></select>
            </div>
        </div>

        <form id="kartleggingForm" style="display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="elevNavn" placeholder="Elevens navn" required style="flex: 2;">
            <input type="number" id="poengsum" placeholder="Poeng" required style="flex: 1;">
            <button type="submit" class="save-btn">Lagre</button>
        </form>

        <table id="resultatTabell">
            <thead>
                <tr><th>Elev</th><th>Trinn</th><th>Fag</th><th>Poeng</th><th>Registrert av</th></tr>
            </thead>
            <tbody id="tabellKropp"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    // DIN KONFIGURASJON
    const firebaseConfig = {
        apiKey: "AIzaSyC7g1gllBUVACl3fkpYeEe7r1LfBs2ck3U",
        authDomain: "lokal-kartlegging.firebaseapp.com",
        databaseURL: "https://lokal-kartlegging-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lokal-kartlegging",
        storageBucket: "lokal-kartlegging.appspot.com",
        messagingSenderId: "913824113769",
        appId: "1:913824113769:web:95c6fdea2d3b49813d6ef8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    const authSection = document.getElementById('auth-section');
    const appContent = document.getElementById('app-content');
    const userInfo = document.getElementById('userInfo');

    // LOGG INN / UT FUNKSJONER
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            authSection.style.display = 'none';
            appContent.style.display = 'block';
            userInfo.innerText = `Innlogget som: ${user.displayName} (${user.email})`;
            lastInnData();
        } else {
            authSection.style.display = 'block';
            appContent.style.display = 'none';
        }
    });

    // LAGRE DATA
    document.getElementById('kartleggingForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            navn: document.getElementById('elevNavn').value,
            trinn: document.getElementById('trinn').value,
            fag: document.getElementById('fag').value,
            poeng: document.getElementById('poengsum').value,
            skoleaar: document.getElementById('skoleaar').value,
            registrertAv: auth.currentUser.displayName,
            timestamp: Date.now()
        };

        try {
            await push(ref(db, 'kartlegginger'), data);
            document.getElementById('elevNavn').value = "";
            document.getElementById('poengsum').value = "";
        } catch (error) {
            alert("Feil: " + error.message);
        }
    };

    // VISE DATA
    function lastInnData() {
        const dataRef = query(ref(db, 'kartlegginger'), limitToLast(20));
        onValue(dataRef, (snapshot) => {
            const tabellKropp = document.getElementById('tabellKropp');
            tabellKropp.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const d = childSnapshot.val();
                let row = `<tr>
                    <td>${d.navn}</td>
                    <td>${d.trinn}</td>
                    <td>${d.fag}</td>
                    <td><b>${d.poeng}</b></td>
                    <td>${d.registrertAv}</td>
                </tr>`;
                tabellKropp.insertAdjacentHTML('afterbegin', row);
            });
        });
    }
</script>
</body>
</html>
