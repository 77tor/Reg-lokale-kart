<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartleggingsverktøy Pro - 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --info: #3498db; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 98%; margin: 0 auto; background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .selectors { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .selectors div { display: flex; flex-direction: column; }
        label { font-size: 0.75em; font-weight: bold; margin-bottom: 4px; color: #555; }
        select, input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.9em; }

        .action-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-add { background: var(--accent); color: white; }
        .btn-excel { background: #e67e22; color: white; }
        .btn-report { background: var(--info); color: white; }
        .btn-slett { background: var(--danger); color: white; padding: 5px 8px; font-size: 0.8em; }
        .btn-endre { background: #f39c12; color: white; padding: 5px 8px; font-size: 0.8em; margin-right: 5px; }

        .table-wrapper { overflow-x: auto; margin-top: 15px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; background: white; white-space: nowrap; }
        th { background: #2c3e50; color: white; text-align: left; padding: 10px; font-size: 0.8em; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .critical { background-color: #ffdada !important; color: #c0392b; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 2% auto; padding: 25px; width: 90%; max-width: 850px; border-radius: 10px; max-height: 90vh; overflow-y: auto; }
        .popup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
        .p-group { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #e9ecef; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h2>Kartleggingsverktøy 2026</h2>
        <div id="authArea"><button class="btn" onclick="login()">Logg inn</button></div>
    </div>

    <div id="mainContent" style="opacity: 0.5; pointer-events: none;">
        <div class="selectors">
            <div><label>Skoleår</label><select id="mAar" onchange="oppdater()"><option value="2024-2025">2024/2025</option><option value="2025-2026" selected>2025/2026</option></select></div>
            <div><label>Trinn</label><select id="mTrinn" onchange="oppdater()"><option value="1">1. trinn</option><option value="2">2. trinn</option><option value="3">3. trinn</option><option value="4">4. trinn</option><option value="5">5. trinn</option><option value="6">6. trinn</option><option value="7">7. trinn</option></select></div>
            <div><label>Klasse</label><select id="mKlasse" onchange="oppdater()"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option id="optD" value="D" class="hidden">D</option></select></div>
            <div><label>Fag</label><select id="mFag" onchange="oppdater()"><option value="Lesing">Lesing</option><option value="Regning">Regning</option></select></div>
            <div><label>Periode</label><select id="mPeriode" onchange="oppdater()"><option value="Høst">Høst</option><option value="Vår">Vår</option></select></div>
        </div>

        <div class="action-bar">
            <button class="btn btn-add" onclick="aapnePopup()">+ Nytt resultat</button>
            <button class="btn btn-excel" onclick="exporterTilExcel()">💾 Eksporter Excel</button>
            <button class="btn btn-report" onclick="visEnkelRapport()">📊 Rapport</button>
        </div>

        <div class="table-wrapper">
            <table id="resultatTabell">
                <thead id="tHead"></thead>
                <tbody id="tBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="pop" class="modal">
    <div class="modal-content">
        <h3 id="popTittel">Registrer resultat</h3>
        <input type="hidden" id="editId">
        <input type="text" id="eNavn" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Elevens Navn">
        <div id="oppgArea" class="popup-grid"></div>
        <div style="background:#2c3e50; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <strong>TOTAL: <span id="pSum">0</span> / <span id="pMaks">0</span></strong>
            <button class="btn btn-add" onclick="lagre()">LAGRE</button>
        </div>
    </div>
</div>

<script>
// --- KONFIGURASJON ---
const firebaseConfig = {
    apiKey: "AIzaSyC7g1gllBUVACl3fkpYeEe7r1LfBs2ck3U",
    authDomain: "lokal-kartlegging.firebaseapp.com",
    databaseURL: "https://lokal-kartlegging-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "lokal-kartlegging",
    storageBucket: "lokal-kartlegging.firebasestorage.app",
    messagingSenderId: "913824113769",
    appId: "1:913824113769:web:95c6fdea2d3b49813d6ef8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

// --- UTVIDET DATASTRUKTUR ---
const oppgaveStruktur = {
    "Standard": {
        "Lesing": {
            "Høst": {
                "1": [{navn: "Rim", maks: 6}, {navn: "Stavelser", maks: 8}, {navn: "Første lyd", maks: 8}],
                "2": [{navn: "Lese 1", maks: 4}, {navn: "Lese 2", maks: 9}, {navn: "Stave", maks: 5}],
                "3": [{navn: "Lese 1", maks: 7}, {navn: "Ord", maks: 5}, {navn: "Tekst", maks: 10}],
                "4": [{navn: "Ordflyt", maks: 10}, {navn: "Forståelse", maks: 10}],
                "5": [{navn: "Hovedmål", maks: 15}, {navn: "Tolking", maks: 10}],
                "6": [{navn: "Analyse", maks: 20}, {navn: "Flyt", maks: 10}],
                "7": [{navn: "Refleksjon", maks: 20}, {navn: "Tekstforståelse", maks: 15}]
            },
            "Vår": { "1": [{navn: "Bokstaver", maks: 29}], "2": [{navn: "Setninger", maks: 10}] }
        },
        "Regning": {
            "Høst": { "1": [{navn: "Tall", maks: 10}], "4": [{navn: "Ganging", maks: 10}, {navn: "Deling", maks: 10}] }
        }
    }
};

function login() { auth.signInWithPopup(provider); }
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('authArea').innerHTML = `<span>${user.email}</span> <button onclick="auth.signOut()">Ut</button>`;
        document.getElementById('mainContent').style.opacity = "1";
        document.getElementById('mainContent').style.pointerEvents = "all";
        oppdater();
    }
});

function getOppgaver() {
    const f = document.getElementById('mFag').value, p = document.getElementById('mPeriode').value, t = document.getElementById('mTrinn').value;
    return oppgaveStruktur["Standard"][f]?.[p]?.[t] || [{navn: "Oppgave 1", maks: 10}];
}

function oppdater() {
    const trinn = document.getElementById('mTrinn').value;
    document.getElementById('optD').classList.toggle('hidden', parseInt(trinn) < 4);
    
    byggHode();
    hentData();
}

function byggHode() {
    const oppgaver = getOppgaver();
    let html = `<tr><th>Navn</th>`;
    oppgaver.forEach(o => html += `<th>${o.navn}</th>`);
    html += `<th>SUM</th><th>%</th><th>Status</th><th>Handling</th></tr>`;
    document.getElementById('tHead').innerHTML = html;
}

function hentData() {
    const path = `resultater/${document.getElementById('mAar').value}/${document.getElementById('mFag').value}/${document.getElementById('mTrinn').value}/${document.getElementById('mKlasse').value}/${document.getElementById('mPeriode').value}`;
    db.ref(path).on('value', snap => {
        const tBody = document.getElementById('tBody');
        tBody.innerHTML = "";
        const oppgaver = getOppgaver();
        
        snap.forEach(child => {
            const d = child.val();
            const pros = Math.round((d.sum / d.maks) * 100);
            const crit = pros < 20;
            
            let row = `<tr class="${crit ? 'critical' : ''}"><td><strong>${d.navn}</strong></td>`;
            oppgaver.forEach((o, i) => row += `<td>${d.detaljer?.[i] || 0}</td>`);
            row += `<td>${d.sum}/${d.maks}</td><td>${pros}%</td>`;
            row += `<td>${crit ? 'Under grense' : 'OK'}</td>`;
            row += `<td>
                <button class="btn-endre" onclick="endre('${child.key}')">Endre</button>
                <button class="btn-slett" onclick="slett('${child.key}')">Slett</button>
            </td></tr>`;
            tBody.innerHTML += row;
        });
    });
}

async function lagre() {
    const id = document.getElementById('editId').value;
    const detaljer = Array.from(document.querySelectorAll('.pop-in')).map(i => parseInt(i.value) || 0);
    const path = `resultater/${document.getElementById('mAar').value}/${document.getElementById('mFag').value}/${document.getElementById('mTrinn').value}/${document.getElementById('mKlasse').value}/${document.getElementById('mPeriode').value}`;
    
    const data = {
        navn: document.getElementById('eNavn').value,
        sum: parseInt(document.getElementById('pSum').innerText),
        maks: parseInt(document.getElementById('pMaks').innerText),
        detaljer: detaljer
    };

    if (id) await db.ref(`${path}/${id}`).set(data);
    else await db.ref(path).push(data);
    document.getElementById('pop').style.display = "none";
}

function exporterTilExcel() {
    let csv = "\uFEFF"; // UTF-8 BOM for norske tegn
    const rows = document.querySelectorAll("table tr");
    
    rows.forEach(row => {
        const cols = row.querySelectorAll("td, th");
        let rowData = [];
        cols.forEach((col, index) => {
            // Vi skipper den siste kolonnen (Handling) i eksporten
            if (index < cols.length - 1) rowData.push('"' + col.innerText + '"');
        });
        csv += rowData.join(";") + "\r\n";
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", `Kartlegging_${document.getElementById('mTrinn').value}${document.getElementById('mKlasse').value}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function visEnkelRapport() {
    const rows = document.querySelectorAll("#tBody tr");
    let antall = rows.length;
    let under = document.querySelectorAll(".critical").length;
    alert(`Rapport for ${document.getElementById('mTrinn').value}${document.getElementById('mKlasse').value}:\n\nAntall elever: ${antall}\nUnder kritisk grense: ${under}\n\nEksport til Excel anbefales for detaljert analyse.`);
}

async function endre(key) {
    const path = `resultater/${document.getElementById('mAar').value}/${document.getElementById('mFag').value}/${document.getElementById('mTrinn').value}/${document.getElementById('mKlasse').value}/${document.getElementById('mPeriode').value}`;
    const snap = await db.ref(`${path}/${key}`).get();
    const d = snap.val();
    aapnePopup(d);
    document.getElementById('editId').value = key;
}

function slett(key) {
    if (confirm("Slette?")) {
        const path = `resultater/${document.getElementById('mAar').value}/${document.getElementById('mFag').value}/${document.getElementById('mTrinn').value}/${document.getElementById('mKlasse').value}/${document.getElementById('mPeriode').value}`;
        db.ref(`${path}/${key}`).remove();
    }
}

function aapnePopup(eks = null) {
    const oppgaver = getOppgaver();
    const area = document.getElementById('oppgArea');
    area.innerHTML = "";
    let m = 0;
    oppgaver.forEach((o, i) => {
        m += o.maks;
        area.innerHTML += `<div class="p-group"><label>${o.navn} (${o.maks})</label><input type="number" class="pop-in" value="${eks ? eks.detaljer[i] : 0}" oninput="sumPop()"></div>`;
    });
    document.getElementById('pMaks').innerText = m;
    document.getElementById('eNavn').value = eks ? eks.navn : "";
    document.getElementById('pop').style.display = "block";
    sumPop();
}

function sumPop() {
    let s = 0;
    document.querySelectorAll('.pop-in').forEach(i => s += parseInt(i.value) || 0);
    document.getElementById('pSum').innerText = s;
}

function lukk() { document.getElementById('pop').style.display = "none"; }
</script>
</body>
</html>
